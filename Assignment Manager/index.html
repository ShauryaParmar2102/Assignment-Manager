<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Assignment Manager</title>
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>
        <section class="AssignmentManager">
            <header class="card">
                <h1>Assignment Manager</h1>
                <form id="AssignmentForm">
                <input type="text" id="AssignmentInput" placeholder="Add Assignment..." required>
                    <button type="submit">Add Assignment</button>

                </form>
            </header>

            <section id="AssignmentContainer"></section>
        </section>
        <div class="confirm">
            <h1>Confirm Action</h1>
        <p>Are you sure that you want to delete this Assignment?</p>
            <button class="cancel">Cancel</button>
            <button autofocus class="confirmed">Confirm</button>
        </div>
    <script src="script.js"></script>
    
    </body>
</html>
